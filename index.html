<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵栖</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="draw-modal" aria-label="灵栖主界面">
      <section class="draw-sky">
        <canvas id="starfield" class="draw-particles" aria-hidden="true"></canvas>
        <div id="exhaleLayer" class="exhale-layer" aria-hidden="true"></div>
        <button id="enterButton" class="draw-fate-line" type="button" aria-pressed="false" aria-label="浸入灵栖"></button>
        <div class="draw-center-copy" aria-live="polite">
          <strong id="phaseLabel">浸入灵栖</strong>
          <span id="phaseHint">TOUCH TO ENTER LINGQI</span>
        </div>
      </section>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
